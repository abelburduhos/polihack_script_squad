<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hazard Response</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="grid-bg"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo-dot"></div>
      <div>
        <div class="brand-title">Hazard Response</div>
        <div class="brand-sub">autonomous field monitoring</div>
      </div>
    </div>
    <div class="topbar-stats">
      <div class="stat"><div class="stat-label">Sensors</div>  <div class="stat-value" id="stat-sensors">—</div></div>
      <div class="stat"><div class="stat-label">Drones</div>   <div class="stat-value" id="stat-drones">—</div></div>
      <div class="stat"><div class="stat-label">Hazards</div>  <div class="stat-value" id="stat-hazards">—</div></div>
      <div class="stat"><div class="stat-label">Incidents</div><div class="stat-value" id="stat-incidents">0</div></div>
      <div class="stat status-wrap">
        <div class="stat-label">Link</div>
        <div class="stat-value"><span class="dot" id="link-dot"></span><span id="link-text">connecting</span></div>
      </div>
    </div>
  </header>

  <main class="layout">

    <!-- ─── Sensors ─────────────────────────────────────────────── -->
    <section class="panel sensors">
      <div class="panel-head">
        <h2>Sensors</h2>
        <div class="panel-tools">
          <span class="panel-sub" id="last-tick">—</span>
          <button class="btn-pill" data-open-form="sensor">+ add</button>
        </div>
      </div>

      <div class="add-form" id="sensor-form" hidden>
        <div class="form-row">
          <label>Type
            <select id="sensor-type"></select>
          </label>
          <label>ID
            <input id="sensor-id" type="text" placeholder="e.g. river-02" />
          </label>
        </div>
        <div class="form-row">
          <label>Lat
            <input id="sensor-lat" type="number" step="0.0001" />
          </label>
          <label>Lon
            <input id="sensor-lon" type="number" step="0.0001" />
          </label>
          <button class="btn-ghost map-pick" data-pick="sensor" type="button">pick on map</button>
        </div>
        <div class="form-actions">
          <span class="form-err" id="sensor-err"></span>
          <button class="btn-ghost" data-close-form="sensor" type="button">cancel</button>
          <button class="btn-primary" id="sensor-add" type="button">add sensor</button>
        </div>
      </div>

      <div class="sensor-grid" id="sensor-grid"></div>
    </section>

    <!-- ─── Map ─────────────────────────────────────────────────── -->
    <section class="panel map-panel">
      <div class="panel-head">
        <h2>Field Map</h2>
        <span class="panel-sub" id="map-hint">live</span>
      </div>
      <div class="map-wrap">
        <svg id="map" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="legend">
          <span><i class="sw flood"></i>Flood sensor</span>
          <span><i class="sw fire"></i>Fire sensor</span>
          <span><i class="sw drone"></i>Drone</span>
          <span><i class="sw incident"></i>Incident</span>
        </div>
        <div class="map-cancel-pick" id="pick-banner" hidden>
          Click the map to place
          <button class="btn-ghost" id="pick-cancel" type="button">cancel</button>
        </div>
      </div>
    </section>

    <!-- ─── Drone Fleet ─────────────────────────────────────────── -->
    <section class="panel drones">
      <div class="panel-head">
        <h2>Drone Fleet</h2>
        <div class="panel-tools">
          <span class="panel-sub" id="drone-count">—</span>
          <button class="btn-pill" data-open-form="drone">+ add</button>
        </div>
      </div>

      <div class="add-form" id="drone-form" hidden>
        <div class="form-row">
          <label>ID
            <input id="drone-id" type="text" placeholder="e.g. drone-C" />
          </label>
          <label>Range (km)
            <input id="drone-range" type="number" min="1" max="500" step="1" value="30" />
          </label>
        </div>
        <div class="form-row">
          <label>Home lat
            <input id="drone-lat" type="number" step="0.0001" />
          </label>
          <label>Home lon
            <input id="drone-lon" type="number" step="0.0001" />
          </label>
          <button class="btn-ghost map-pick" data-pick="drone" type="button">pick on map</button>
        </div>
        <div class="form-actions">
          <span class="form-err" id="drone-err"></span>
          <button class="btn-ghost" data-close-form="drone" type="button">cancel</button>
          <button class="btn-primary" id="drone-add" type="button">add drone</button>
        </div>
      </div>

      <div class="drone-list" id="drone-list"></div>
    </section>

    <!-- ─── Incidents ───────────────────────────────────────────── -->
    <section class="panel incidents">
      <div class="panel-head">
        <h2>Incident Feed</h2>
        <button class="btn-ghost" id="clear-incidents">Clear</button>
      </div>
      <div class="incident-list" id="incident-list">
        <div class="empty">No incidents yet — system nominal.</div>
      </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
