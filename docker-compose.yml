services:
  db:
    image: postgres:16-alpine
    container_name: cdm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdm
      POSTGRES_PASSWORD: cdm
      POSTGRES_DB: cdm
    ports:
      - "5432:5432"
    volumes:
      - cdm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdm -d cdm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  cdm_pgdata:
